<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Смеемся / Плачем</title>
<style>
body {
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%);
margin: 0; padding: 20px; color: #333; min-height: 100vh;
}
.container { max-width: 400px; margin: auto; background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
h1 { font-size: 28px; margin-bottom: 5px; }
.status { color: #2ed573; font-size: 14px; margin-bottom: 20px; font-weight: bold; }
.card { border: 1px solid #eee; padding: 15px; border-radius: 20px; margin: 10px 0; display: flex; align-items: center; cursor: pointer; transition: 0.3s; }
.card:hover { background: #f9f9f9; }
.icon { font-size: 24px; margin-right: 15px; }
.big-btn { width: 100%; padding: 18px; border-radius: 50px; border: none; background: #007bff; color: white; font-weight: bold; font-size: 16px; margin-top: 20px; }
</style>
</head>
<body>

<div class="container">
<h1>СМЕЕМСЯ / ПЛАЧЕМ</h1>
<div class="status">● Игра готова к запуску</div>

<div style="margin-bottom: 20px;">[1] игрока в лобби <a href="#">Изм.</a></div>

<div class="card">
<div class="icon">📁</div>
<div><strong>Классический</strong><br><small>Случайные задания для всех</small></div>
</div>

<div class="card">
<div class="icon">🔥</div>
<div><strong>Хардкор</strong><br><small>Самые безумные испытания</small></div>
</div>

<button class="big-btn">Крутить колесо</button>
</div>

</body>
</html>
