<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Плачем / Смеемся</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
.container { max-width: 400px; margin: auto; }
/* Колесо */
#wheel-container { position: relative; width: 300px; height: 300px; margin: 20px auto; border-radius: 50%; border: 10px solid #fff; display: flex; align-items: center; justify-content: center; transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99); background: conic-gradient(#2ed573 0deg 120deg, #ff4757 120deg 240deg, #a55eea 240deg 360deg); }
#arrow { position: absolute; top: -20px; font-size: 30px; }
.mode-btn { padding: 10px 20px; margin: 5px; border-radius: 20px; cursor: pointer; border: none; }
#task-display { margin-top: 20px; padding: 20px; background: #333; border-radius: 15px; min-height: 80px; }
</style>
</head>
<body>

<div class="container">
<h1>Плачем / Смеемся</h1>
<div id="arrow">▼</div>
<div id="wheel-container"></div>
<div id="task-display">Крути, чтобы получить задание!</div>
<button onclick="spin()">КРУТИТЬ</button>
</div>

<script>
const db = {
classic: {
easy: ["Обними соседа", "Изобрази кота", "Расскажи стих про табуретку", "Попробуй удержать книгу на голове 30 сек"],
medium: ["Спой как оперный певец", "Расскажи смешной секрет", "Сделай 20 приседаний", "Изобрази официанта-неудачника"],
hard: ["Позвони в доставку и спроси, есть ли у них борщ", "Признайся в любви к холодильнику", "Напиши сообщение случайному контакту: 'Я все знаю'"]
},
adult: {
easy: ["Сделай 10 глубоких вдохов с закрытыми глазами", "Начни разговор с вопроса: 'А где тут выход?'", "Изобрази звук работающего трактора"],
medium: ["Сбрей кончик брови (или сделай вид)", "Позвони в автосервис и спроси про депиляцию", "Напиши сторис 'Охуеть'"],
hard: ["Позвони в секс-шоп и узнай стоимость самого большого товара", "Крикни в окно 'Я люблю пельмени!'", "Позвони бывшей и скажи 'Я не могу без тебя жить'"]
}
};

function spin() {
const wheel = document.getElementById('wheel-container');
const degrees = Math.floor(Math.random() * 360) + 1800; // Крутим несколько раз
wheel.style.transform = `rotate(${degrees}deg)`;

setTimeout(() => {
const angle = degrees % 360;
let level = angle < 120 ? 'easy' : (angle < 240 ? 'medium' : 'hard');
const tasks = db['adult'][level]; // Можно менять на classic или adult
document.getElementById('task-display').innerText = tasks[Math.floor(Math.random() * tasks.length)];
}, 3000);
}
</script>
</body>
</html>
