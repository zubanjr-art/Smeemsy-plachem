<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Плачем / Смеемся</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
.container { max-width: 400px; margin: auto; background: #252525; padding: 20px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.screen { display: none; } .active { display: block; }
.card { border: 2px solid #444; padding: 15px; border-radius: 20px; margin: 10px 0; cursor: pointer; transition: 0.3s; }
.selected { border-color: #a55eea; background: #3c2a66; }
button { width: 100%; padding: 15px; border-radius: 20px; border: none; background: #007bff; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }

/* Колесо */
#wheel-container { position: relative; width: 250px; height: 250px; margin: 20px auto; border-radius: 50%; border: 8px solid #fff;
background: conic-gradient(#2ed573 0deg 120deg, #ff4757 120deg 240deg, #a55eea 240deg 360deg);
transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
#arrow { font-size: 40px; margin-bottom: -10px; }
#task-display { margin: 20px; padding: 20px; background: #333; border-radius: 15px; min-height: 60px; }
.player-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #444; }
</style>
</head>
<body>

<div class="container">
<div id="screen-menu" class="screen active">
<h1>Плачем / Смеемся</h1>
<div class="card" onclick="selectMode(this, 'classic')">Классический</div>
<div class="card" onclick="selectMode(this, 'hardcore')">Хардкор</div>
<div class="card" onclick="selectMode(this, 'adult')">Вечеринка 18+</div>
<button onclick="goToPlayers()">Начать играть</button>
</div>

<div id="screen-players" class="screen">
<h1>Кто играет?</h1>
<input type="text" id="player-input" style="padding:10px; width:80%; border-radius:10px;" placeholder="Имя игрока">
<button onclick="addPlayer()">+ Добавить</button>
<div id="player-list"></div>
<button style="background:#2ed573" onclick="startGame()">Начать игру</button>
<button style="background:#555" onclick="show('screen-menu')">Назад</button>
</div>

<div id="screen-game" class="screen">
<h2 id="current-player">Ход: </h2>
<div id="arrow">▼</div>
<div id="wheel-container"></div>
<div id="task-display">Крути колесо!</div>
<button onclick="spin()">КРУТИТЬ</button>
<button style="background:#555" onclick="show('screen-menu')">В меню</button>
</div>
</div>

<script>
let mode = '', players = [], currentPlayerIdx = 0;
const db = {
classic: { easy: ["Обними соседа", "Изобрази кота"], medium: ["Спой оперу", "Сделай 20 приседаний"], hard: ["Напиши бывшей: Я все знаю"] },
adult: { easy: ["Покажи язык", "Расскажи нелепый секрет"], medium: ["Сбрей кончик брови", "Позвони в автосервис"], hard: ["Крикни в окно: Я люблю пельмени!"] }
};

function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function selectMode(el, m) { document.querySelectorAll('.card').forEach(c => c.classList.remove('selected')); el.classList.add('selected'); mode = m; }
function goToPlayers() { if (!mode) return alert('Выберите режим!'); show('screen-players'); }
function addPlayer() { const p = document.getElementById('player-input'); if(p.value) { players.push(p.value); render(); p.value=''; } }
function render() { document.getElementById('player-list').innerHTML = players.map((p, i) => `<div class='player-item'>${p} <button onclick='players.splice(${i},1);render()'>X</button></div>`).join(''); }

function startGame() { if(players.length==0) return alert('Добавьте игроков!'); show('screen-game'); document.getElementById('current-player').innerText = "Ход: " + players[0]; }

function spin() {
const wheel = document.getElementById('wheel-container');
const deg = Math.floor(Math.random() * 360) + 1800;
wheel.style.transform = `rotate(${deg}deg)`;
setTimeout(() => {
const level = (deg % 360) < 120 ? 'easy' : ((deg % 360) < 240 ? 'medium' : 'hard');
const tasks = db[mode]?.[level] || ["Задание не найдено"];
document.getElementById('task-display').innerText = tasks[Math.floor(Math.random() * tasks.length)];
currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
document.getElementById('current-player').innerText = "Ход: " + players[currentPlayerIdx];
}, 3000);
}
</script>
</body>
</html>
