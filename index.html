<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Колесо Треша</title>
<style>
body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background: #1a1a1a; color: #fff; }
#wheel { width: 280px; height: 280px; border: 8px solid #ff4757; border-radius: 50%; margin: 30px auto;
display: flex; align-items: center; justify-content: center; font-weight: bold;
font-size: 16px; transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99); background: #333; padding: 15px; }
button { padding: 15px 25px; font-size: 18px; cursor: pointer; border-radius: 30px; border: none; background: #ff4757; color: white; margin: 5px; font-weight: bold; }
.spin-anim { transform: rotate(1800deg); }
</style>
</head>
<body>
<h1>🎮 Колесо Треша</h1>
<div class="cats">
<button onclick="setMode('classic')">Классика</button>
<button onclick="setMode('hardcore')">Хардкор</button>
</div>
<div id="wheel">Готов к безумию?</div>
<button onclick="spin()">КРУТИТЬ</button>

let currentMode = 'classic';

function setMode(mode) { currentMode = mode; document.getElementById('wheel').innerText = "Режим: " + mode; }

function spin() {
const wheel = document.getElementById('wheel');
wheel.classList.add('spin-anim');
setTimeout(() => wheel.classList.remove('spin-anim'), 3000);
setTimeout(() => {
const tasks = db[currentMode];
wheel.innerText = tasks[Math.floor(Math.random() * tasks.length)];
}, 1000);
}
</script>
</body>
</html>
